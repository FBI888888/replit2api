kind = "web"
previewPath = "/"
title = "AI API Proxy Portal"
version = "1.0.0"
id = "artifacts/api-portal-v2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20949

[services.development]
run = "pnpm --filter @workspace/api-portal-v2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/api-portal-v2", "run", "build" ]
publicDir = "artifacts/api-portal-v2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20949"
BASE_PATH = "/"
